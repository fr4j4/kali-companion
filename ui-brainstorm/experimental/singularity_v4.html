<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Singularity v4 — Cognitive Workspace</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script>
  tailwind.config = { theme: { extend: {
    colors: { bg:'#02040a', fg:'#e2e8f0', muted:'#64748b', faint:'#3a4058',
      accent:'#22d3ee', accent2:'#818cf8', accent3:'#f472b6', ok:'#34d399', warn:'#fbbf24', err:'#f87171' },
    fontFamily: { sans:['Inter','sans-serif'], serif:['Fraunces','serif'], mono:['JetBrains Mono','monospace'] },
  }}};
</script>
<style>
  body { background:#02040a; color:#e2e8f0; font-family:'Inter', sans-serif; overflow:hidden; }
  .prose-center { font-family:'Fraunces', serif; font-size:1.6rem; line-height:1.5; text-align:center; font-variation-settings:"SOFT" 60; }

  .mesh {
    background: radial-gradient(circle at 50% 50%, rgba(34,211,238,0.08), transparent 50%),
                radial-gradient(circle at 10% 10%, rgba(129,140,248,0.05), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(244,114,182,0.05), transparent 40%), #02040a;
    animation: drift 30s ease-in-out infinite alternate;
  }
  @keyframes drift { from { background-position: 0% 0%; } to { background-position: 100% 100%; } }

  @keyframes morph { 0%,100%{ border-radius:40% 60% 70% 30%/40% 40% 60% 60%; } 50%{ border-radius:60% 40% 30% 70%/60% 60% 40% 40%; } }
  .orb { animation: morph 8s ease-in-out infinite; background:radial-gradient(circle at 30% 30%, #67e8f9, #22d3ee 40%, #0891b2 100%); filter:drop-shadow(0 0 40px rgba(34,211,238,0.4)); }

  .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.07); }
  .glass-strong { background: rgba(10, 15, 30, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); }
  .glass-ide { background: rgba(8, 12, 24, 0.95); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.06); }

  .cursor { display:inline-block; width:2px; height:1em; background:#22d3ee; animation:blink 1.1s steps(2,start) infinite; }
  @keyframes blink { 50%{opacity:0;} }

  .scrollbar-thin::-webkit-scrollbar { width:5px; height:5px; }
  .scrollbar-thin::-webkit-scrollbar-track { background:transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:3px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.2); }
  .scrollbar-hide::-webkit-scrollbar { display:none; }
  .scrollbar-hide { scrollbar-width:none; }

  .debug-panel { cursor:grab; user-select:none; }
  .debug-panel:active { cursor:grabbing; }

  .btn-glow { box-shadow:0 0 20px rgba(34,211,238,0.3); }
  .hover-lift { transition:all 0.2s ease; }
  .hover-lift:hover { transform:translateY(-2px); }

  .badge { font-family:'JetBrains Mono', monospace; font-size:9px; letter-spacing:0.08em; text-transform:uppercase; }

  .tooltip { position:relative; }
  .tooltip::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%); background:rgba(10,15,30,0.95); color:#e2e8f0; font-size:10px; padding:4px 8px; border-radius:6px; white-space:nowrap; opacity:0; pointer-events:none; transition:opacity 0.2s; font-family:'JetBrains Mono',monospace; z-index:9999; }
  .tooltip:hover::after { opacity:1; }

  /* Ventana de artefacto */
  .aw {
    position:absolute; display:flex; flex-direction:column;
    background: rgba(8,12,24,0.95); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,0.06); border-radius:16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transition: box-shadow 0.3s, border-color 0.3s, opacity 0.3s, transform 0.3s;
    overflow:hidden;
  }
  .aw.focused { border-color: rgba(34,211,238,0.25); box-shadow: 0 0 0 1px rgba(34,211,238,0.15), 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(34,211,238,0.1); }
  .aw.dimmed { opacity:0.82; }
  .aw.entering { animation: awEnter 0.45s cubic-bezier(0.175,0.885,0.32,1.275) both; }
  @keyframes awEnter { from{opacity:0; transform:scale(0.6);} to{opacity:1; transform:scale(1);} }
  .aw.leaving { animation: awLeave 0.3s ease both; }
  @keyframes awLeave { to{opacity:0; transform:scale(0.85);} }

  .aw-header { cursor:grab; user-select:none; }
  .aw-header:active { cursor:grabbing; }
  .aw-resize { cursor:nwse-resize; position:absolute; bottom:0; right:0; width:16px; height:16px; z-index:5; }
  .aw-resize::after { content:''; position:absolute; bottom:3px; right:3px; width:8px; height:8px; border-right:2px solid rgba(255,255,255,0.15); border-bottom:2px solid rgba(255,255,255,0.15); border-radius:0 0 4px 0; }

  /* Grid mode */
  .grid-mode #artifact-layer { display:flex; flex-wrap:wrap; gap:16px; padding:80px 20px 120px; align-items:flex-start; justify-content:center; align-content:flex-start; }
  .grid-mode .aw { position:relative !important; left:auto !important; top:auto !important; }

  /* Waveform */
  .wave-bar { animation: wave 0.8s ease-in-out infinite; }
  @keyframes wave { 0%,100%{height:20%;} 50%{height:100%;} }
  .ring-pulse { animation: ringPulse 3s ease-out infinite; }
  @keyframes ringPulse { 0%{transform:scale(0.8);opacity:0.5;} 100%{transform:scale(2);opacity:0;} }

  .diff-add { background:rgba(52,211,153,0.08); border-left:2px solid #34d399; }
  .diff-del { background:rgba(248,113,113,0.08); border-left:2px solid #f87171; }

  .prose-md { font-family:'Fraunces',serif; font-size:0.92rem; line-height:1.72; }
  .prose-md h1 { font-size:1.3rem; font-weight:600; margin:1rem 0 0.6rem; color:#e2e8f0; }
  .prose-md h2 { font-size:1.1rem; font-weight:600; margin:0.9rem 0 0.5rem; color:#e2e8f0; }
  .prose-md h3 { font-size:0.98rem; font-weight:600; margin:0.8rem 0 0.4rem; color:#cbd5e1; }
  .prose-md p { margin:0.5rem 0; color:rgba(226,232,240,0.85); }
  .prose-md ul, .prose-md ol { margin:0.5rem 0; padding-left:1.2rem; }
  .prose-md li { margin:0.2rem 0; color:rgba(226,232,240,0.8); }
  .prose-md ul li { list-style:disc; }
  .prose-md ol li { list-style:decimal; }
  .prose-md code { font-family:'JetBrains Mono',monospace; font-size:0.82rem; background:rgba(34,211,238,0.08); color:#22d3ee; padding:1px 5px; border-radius:4px; }
  .prose-md pre { background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:12px; overflow-x:auto; margin:0.7rem 0; }
  .prose-md pre code { background:none; color:#e2e8f0; padding:0; }
  .prose-md blockquote { border-left:3px solid rgba(34,211,238,0.3); padding-left:12px; margin:0.7rem 0; color:rgba(226,232,240,0.6); font-style:italic; }
  .prose-md a { color:#22d3ee; text-decoration:none; border-bottom:1px solid rgba(34,211,238,0.3); }
  .prose-md strong { color:#e2e8f0; font-weight:600; }
  .prose-md table { width:100%; border-collapse:collapse; margin:0.7rem 0; font-size:0.82rem; }
  .prose-md th, .prose-md td { border:1px solid rgba(255,255,255,0.08); padding:6px 10px; text-align:left; }
  .prose-md th { background:rgba(255,255,255,0.03); font-weight:600; }

  .callout { border-radius:8px; padding:10px 14px; margin:0.7rem 0; font-size:0.85rem; }
  .callout-info { background:rgba(34,211,238,0.08); border:1px solid rgba(34,211,238,0.15); color:rgba(34,211,238,0.9); }
  .callout-warn { background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.15); color:rgba(251,191,36,0.9); }
  .callout-tip { background:rgba(52,211,153,0.08); border:1px solid rgba(52,211,153,0.15); color:rgba(52,211,153,0.9); }

  /* Mermaid node styles */
  .mm-node { fill:rgba(34,211,238,0.08); stroke:rgba(34,211,238,0.3); stroke-width:1.5; rx:8; }
  .mm-node-decision { fill:rgba(244,114,182,0.08); stroke:rgba(244,114,182,0.3); }
  .mm-line { stroke:rgba(255,255,255,0.15); stroke-width:1.5; fill:none; marker-end:url(#mmArrow); }
  .mm-label { fill:#e2e8f0; font-size:11px; font-family:'Inter',sans-serif; }
  .mm-edge-label { fill:#64748b; font-size:9px; font-family:'JetBrains Mono',monospace; }

  /* JSON tree */
  .json-key { color:#22d3ee; }
  .json-string { color:#86efac; }
  .json-num { color:#fbbf24; }
  .json-bool { color:#f472b6; }
  .json-null { color:#64748b; }
  .json-toggle { cursor:pointer; user-select:none; }
  .json-toggle::before { content:'▸ '; color:#64748b; }
  .json-toggle.open::before { content:'▾ '; }

  /* Terminal */
  .term-line { font-family:'JetBrains Mono',monospace; font-size:0.78rem; line-height:1.5; white-space:pre-wrap; word-break:break-all; }
  .term-prompt { color:#22d3ee; }
  .term-out { color:rgba(226,232,240,0.7); }
  .term-err { color:#f87171; }
  .term-ok { color:#34d399; }
  .term-warn { color:#fbbf24; }

  /* Chart bars */
  .chart-bar { transition: opacity 0.2s; }
  .chart-bar:hover { opacity:0.8; }

  /* Quiz */
  .quiz-option { transition: all 0.2s; cursor:pointer; }
  .quiz-option:hover { background:rgba(255,255,255,0.06); }
  .quiz-option.correct { background:rgba(52,211,153,0.12); border-color:rgba(52,211,153,0.4); }
  .quiz-option.wrong { background:rgba(248,113,113,0.12); border-color:rgba(248,113,113,0.4); }

  /* Checklist */
  .check-item { transition: all 0.2s; }
  .check-item.done .check-label { text-decoration:line-through; color:rgba(226,232,240,0.4); }
  .check-box { transition: all 0.2s; }

  /* Video */
  .video-controls { opacity:0; transition:opacity 0.3s; }
  .video-container:hover .video-controls { opacity:1; }

  /* Music visualizer */
  .music-bar { animation: musicWave 0.6s ease-in-out infinite; transform-origin:bottom; }
  @keyframes musicWave { 0%,100%{transform:scaleY(0.3);} 50%{transform:scaleY(1);} }

  /* Drawer */
  .drawer { transition: transform 0.35s cubic-bezier(0.2,0.7,0.3,1); }
  .drawer.closed { transform: translateX(100%); }
</style>
</head>
<body class="h-screen mesh relative" id="body-root">

  <!-- TOP BAR -->
  <header class="fixed top-0 w-full px-6 py-3 flex justify-between items-center z-50">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2.5 glass rounded-full px-3.5 py-1.5 border-white/10">
        <div class="relative w-2 h-2">
          <div class="absolute inset-0 rounded-full bg-accent ring-pulse"></div>
          <div class="absolute inset-0 rounded-full bg-accent"></div>
        </div>
        <span class="badge text-muted">KALI · V4</span>
      </div>
      <div class="hidden md:flex items-center gap-3 ml-2">
        <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-md glass">
          <span class="badge text-muted">lat</span><span class="badge text-fg">142ms</span>
        </div>
        <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-md glass">
          <span class="badge text-muted">model</span><span class="badge text-fg">gpt-4o</span>
        </div>
        <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-md glass">
          <span class="badge text-muted">tok</span><span class="badge text-fg">4,832</span>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button onclick="openConversationModal()" class="tooltip px-3.5 py-1.5 rounded-full glass hover:bg-white/10 transition badge text-muted hover:text-fg flex items-center gap-1.5" data-tip="Ver conversación completa">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Conversación
      </button>
      <button class="tooltip p-2 rounded-full glass hover:bg-white/10 transition text-muted hover:text-fg" data-tip="Voz">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
      <button class="tooltip p-2 rounded-full glass hover:bg-white/10 transition text-muted hover:text-fg" data-tip="Ajustes">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <div class="w-px h-5 bg-white/10 mx-1"></div>
      <button class="px-3.5 py-1.5 rounded-full glass hover:bg-white/10 transition badge text-muted hover:text-fg flex items-center gap-1.5">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        Nueva Sesión
      </button>
    </div>
  </header>

  <!-- MAIN SPACE -->
  <main class="h-full w-full flex items-center justify-center relative">
    <div class="relative flex flex-col items-center z-10">
      <div class="relative w-56 h-56 flex items-center justify-center">
        <div class="absolute w-40 h-40 rounded-full border border-accent/10 animate-[spin_10s_linear_infinite]"></div>
        <div class="absolute w-32 h-32 rounded-full border border-accent2/20 animate-[spin_15s_linear_infinite_reverse]"></div>
        <div id="orb" class="orb w-32 h-32 flex items-center justify-center relative z-20 cursor-pointer transition-all duration-500 hover:scale-110 active:scale-95">
          <div class="w-4 h-4 rounded-full bg-white/90 shadow-white/40 shadow-lg"></div>
        </div>
      </div>
      <div class="absolute top-64 w-full flex justify-center pointer-events-none">
        <div class="glass-strong px-10 py-8 rounded-3xl max-w-2xl w-full shadow-2xl border-accent/10 transition-all duration-500">
          <p id="projection" class="prose-center text-fg transition-opacity duration-300">Toca el orbe o escribe algo para empezar.</p>
        </div>
      </div>
    </div>
    <div id="artifact-layer" class="absolute inset-0 z-30"></div>
  </main>

  <!-- SPOTLIGHT -->
  <div id="spotlight" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4">
    <div class="glass-strong w-full max-w-xl rounded-3xl p-3 flex items-center gap-3 shadow-2xl border-accent/20">
      <span class="text-accent font-mono ml-3 text-lg">▸</span>
      <input id="cmd-input" type="text" placeholder="Escribe un comando o pregunta..." class="flex-1 bg-transparent outline-none text-lg text-fg placeholder:text-muted py-3" onkeydown="if(event.key==='Enter')sendCommand()">
      <kbd class="badge text-muted bg-white/5 px-2 py-1 rounded">ESC</kbd>
      <button onclick="sendCommand()" class="bg-accent text-bg px-6 py-2 rounded-xl font-semibold text-sm hover:bg-accent2 transition btn-glow">Enviar</button>
    </div>
  </div>

  <!-- VOICE BAR -->
  <div id="voice-bar" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-40 hidden">
    <div class="glass-strong rounded-2xl px-5 py-3 flex items-center gap-4 shadow-2xl border-accent/20">
      <div class="flex items-end gap-0.5 h-6 w-20">
        <div class="wave-bar w-1 bg-accent rounded-full" style="animation-delay:0ms"></div>
        <div class="wave-bar w-1 bg-accent rounded-full" style="animation-delay:80ms"></div>
        <div class="wave-bar w-1 bg-accent rounded-full" style="animation-delay:160ms"></div>
        <div class="wave-bar w-1 bg-accent rounded-full" style="animation-delay:240ms"></div>
        <div class="wave-bar w-1 bg-accent rounded-full" style="animation-delay:320ms"></div>
        <div class="wave-bar w-1 bg-accent rounded-full" style="animation-delay:400ms"></div>
        <div class="wave-bar w-1 bg-accent rounded-full" style="animation-delay:480ms"></div>
        <div class="wave-bar w-1 bg-accent rounded-full" style="animation-delay:560ms"></div>
      </div>
      <span class="badge text-accent">kali hablando</span><span class="badge text-muted">0:12</span>
      <div class="w-px h-4 bg-white/10"></div>
      <button class="tooltip w-7 h-7 rounded-full hover:bg-white/10 text-muted hover:text-fg transition flex items-center justify-center" data-tip="Pausar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button onclick="hideVoiceBar()" class="tooltip w-7 h-7 rounded-full hover:bg-white/10 text-muted hover:text-fg transition flex items-center justify-center" data-tip="Cerrar">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- DOCK INFERIOR (gestión de artefactos) -->
  <footer class="fixed bottom-5 left-1/2 -translate-x-1/2 z-40">
    <div class="glass-strong rounded-2xl px-3 py-2.5 flex items-center gap-2 shadow-2xl border-white/10">
      <button onclick="toggleGridLayout()" class="tooltip h-9 px-3 rounded-xl hover:bg-white/8 text-muted hover:text-fg transition flex items-center gap-2 badge" data-tip="Cambiar layout" id="layout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Grid
      </button>
      <button onclick="focusLast()" class="tooltip h-9 px-3 rounded-xl hover:bg-white/8 text-muted hover:text-fg transition flex items-center gap-2 badge" data-tip="Enfocar último">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="7"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
        Foco
      </button>
      <button onclick="toggleDrawer()" class="tooltip h-9 px-3 rounded-xl hover:bg-white/8 text-muted hover:text-fg transition flex items-center gap-2 badge" data-tip="Biblioteca de artefactos">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        Biblioteca <span id="lib-count" class="text-accent ml-1">0</span>
      </button>
      <div class="w-px h-5 bg-white/10 mx-1"></div>
      <button onclick="clearAllArtifacts()" class="tooltip h-9 px-3 rounded-xl hover:bg-red-500/15 text-red-300/80 hover:text-red-300 transition flex items-center gap-2 badge" data-tip="Limpiar todo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Limpiar
      </button>
    </div>
  </footer>

  <!-- DRAWER LATERAL (biblioteca) -->
  <div id="drawer" class="drawer closed fixed top-0 right-0 bottom-0 w-80 glass-strong z-[55] flex flex-col shadow-2xl border-l border-white/8">
    <div class="flex items-center justify-between px-5 py-4 border-b border-white/8 shrink-0">
      <div>
        <div class="badge text-muted mb-0.5">biblioteca</div>
        <div class="text-sm font-semibold text-fg">Artefactos de la sesión</div>
      </div>

<script>
// ============================================================
// SINGULARITY V4 — COGNITIVE WORKSPACE ENGINE
// ============================================================

const W = {}; // global namespace
const layer = document.getElementById('artifact-layer');
const projection = document.getElementById('projection');
const orb = document.getElementById('orb');

let zIndexCounter = 100;
let artifactIdCounter = 0;
let lastPosition = { x: 0, y: 0 };
let gridMode = false;
const artifacts = []; // { id, type, title, el, closed, timestamp }
const conversation = []; // { role, text, timestamp, artifactTypes }

// --- Spotlight ---
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeSpotlight(); closeConversationModal(); }
  if (document.activeElement.tagName !== 'INPUT' && e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
    document.getElementById('spotlight').classList.remove('hidden');
    document.getElementById('cmd-input').focus();
  }
});
function closeSpotlight() { document.getElementById('spotlight').classList.add('hidden'); }
function sendCommand() {
  const input = document.getElementById('cmd-input');
  if (input.value) W.trigger('text', input.value);
  input.value = ''; closeSpotlight();
}

// --- Voice bar ---
function showVoiceBar() { document.getElementById('voice-bar').classList.remove('hidden'); }
function hideVoiceBar() { document.getElementById('voice-bar').classList.add('hidden'); }
W.hideVoiceBar = hideVoiceBar;

// --- Streaming text ---
function streamText(text) {
  projection.innerHTML = "";
  let i = 0;
  const interval = setInterval(() => {
    projection.innerHTML = text.slice(0, i) + '<span class="cursor"></span>';
    i++;
    if (i > text.length) clearInterval(interval);
  }, 25);
}

// --- Conversation log ---
function logConversation(role, text, artifactTypes = []) {
  conversation.push({ role, text, timestamp: new Date(), artifactTypes });
}
function openConversationModal() {
  const modal = document.getElementById('conv-modal');
  const list = document.getElementById('conv-list');
  list.innerHTML = "";
  if (conversation.length === 0) {
    list.innerHTML = '<p class="text-center text-muted text-sm py-8">No hay conversación aún.</p>';
  } else {
    conversation.forEach((turn, i) => {
      const div = document.createElement('div');
      div.className = 'flex items-start gap-3';
      const num = String(i + 1).padStart(2, '0');
      const isUser = turn.role === 'user';
      const time = turn.timestamp.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `
        <div class="badge ${isUser ? 'text-muted' : 'text-accent'} pt-1 w-8 text-right shrink-0">${num}</div>
        <div class="flex-1">
          <div class="badge mb-1.5 flex items-center gap-2">
            <span class="${isUser ? '' : 'text-accent'}">${isUser ? 'tú' : 'kali'}</span>
            <span class="text-faint">·</span><span class="text-muted">${time}</span>
            ${turn.artifactTypes.length ? `<span class="text-faint">·</span><span class="flex gap-1">${turn.artifactTypes.map(t=>`<span class="text-[8px] px-1.5 py-0.5 rounded bg-white/5 text-muted">${t}</span>`).join('')}</span>`:''}
          </div>
          <p class="${isUser ? 'echo' : 'prose-center'}" style="${isUser?'font-family:Fraunces,serif;font-style:italic;color:#64748b;font-size:0.95rem;text-align:left;':''}">${turn.text}</p>
        </div>`;
      list.appendChild(div);
      if (i < conversation.length - 1) list.appendChild(Object.assign(document.createElement('div'), { className: 'h-px bg-white/5 ml-11' }));
    });
  }
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}
function closeConversationModal() {
  const m = document.getElementById('conv-modal');
  m.classList.add('hidden'); m.classList.remove('flex');
}
document.getElementById('conv-modal').addEventListener('click', (e) => {
  if (e.target.id === 'conv-modal') closeConversationModal();
});

// --- Drawer ---
function toggleDrawer() {
  const d = document.getElementById('drawer');
  d.classList.toggle('closed');
  renderDrawer();
}
function renderDrawer() {
  const list = document.getElementById('drawer-list');
  document.getElementById('drawer-total').textContent = artifacts.length;
  document.getElementById('lib-count').textContent = artifacts.length;
  list.innerHTML = "";
  if (artifacts.length === 0) {
    list.innerHTML = '<p class="text-center text-muted text-xs py-6">Sin artefactos aún.</p>';
    return;
  }
  artifacts.slice().reverse().forEach(a => {
    const item = document.createElement('div');
    item.className = `flex items-center gap-3 p-2.5 rounded-xl border border-white/5 hover:bg-white/5 transition cursor-pointer ${a.closed ? 'opacity-50' : ''}`;
    const iconMap = { code:'💻', hero:'🛡️', img:'🖼️', link:'🔗', markdown:'📝', mermaid:'🔀', music:'🎵', longtext:'📄', chart:'📊', json:'🗂️', terminal:'🖥️', checklist:'✅', video:'🎬', quiz:'❓', diff:'🔧', table:'📋', controls:'🎛️' };
    const icon = iconMap[a.type] || '📦';
    const time = a.timestamp.toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
    item.innerHTML = `
      <div class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-sm shrink-0">${icon}</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs text-fg truncate">${a.title}</div>
        <div class="badge text-muted mt-0.5">${a.type} · ${time} · ${a.closed?'cerrado':'activo'}</div>
      </div>
      ${a.closed ? '<button class="badge text-accent hover:text-fg transition px-2 py-1 rounded hover:bg-white/5 shrink-0">recuperar</button>' : '<div class="w-2 h-2 rounded-full bg-ok shrink-0"></div>'}
    `;
    if (a.closed) {
      item.querySelector('button').onclick = () => restoreArtifact(a.id);
    } else {
      item.onclick = () => focusWindow(a.el);
    }
    list.appendChild(item);
  });
}

// --- Layout toggle ---
function toggleGridLayout() {
  gridMode = !gridMode;
  document.body.classList.toggle('grid-mode', gridMode);
  document.getElementById('layout-btn').innerHTML = gridMode
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6M12 17v6M1 12h6M17 12h6"/></svg> Canvas'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg> Grid';
}

// --- Focus management ---
function focusWindow(el) {
  if (!el || !el.parentNode) return;
  zIndexCounter++;
  el.style.zIndex = zIndexCounter;
  document.querySelectorAll('.aw').forEach(w => { w.classList.remove('focused'); w.classList.add('dimmed'); });
  el.classList.add('focused');
  el.classList.remove('dimmed');
}
function focusLast() {
  const visible = artifacts.filter(a => !a.closed);
  if (visible.length === 0) return;
  focusWindow(visible[visible.length - 1].el);
  visible[visible.length - 1].el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// --- Clear all ---
function clearAllArtifacts() {
  artifacts.forEach(a => { if (a.el && a.el.parentNode) a.el.remove(); });
  artifacts.length = 0;
  updateCount(); renderDrawer();
}
W.clearArtifacts = clearAllArtifacts;

// --- Count ---
function updateCount() {
  const visible = artifacts.filter(a => !a.closed).length;
  document.getElementById('aw-count').textContent = visible;
}

// --- Restore ---
function restoreArtifact(id) {
  const a = artifacts.find(x => x.id === id);
  if (!a || !a.closed) return;
  a.closed = false;
  a.el.classList.remove('leaving');
  a.el.style.display = '';
  a.el.classList.add('entering');
  setTimeout(() => a.el.classList.remove('entering'), 500);
  zIndexCounter++; a.el.style.zIndex = zIndexCounter;
  updateCount(); renderDrawer(); focusWindow(a.el);
}

// --- Close ---
function closeArtifact(id) {
  const a = artifacts.find(x => x.id === id);
  if (!a) return;
  a.closed = true;
  a.el.classList.add('leaving');
  setTimeout(() => { a.el.style.display = 'none'; a.el.classList.remove('leaving'); }, 300);
  updateCount(); renderDrawer();
}

// --- Position ---
function getNextPosition(width = 320, height = 300) {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  const safeW = 560, safeH = 360; // zona segura del orbe+texto
  const margin = 60;
  const maxW = window.innerWidth - width - margin;
  const maxH = window.innerHeight - height - 120;

  // Cascada con offset
  let x = cx + 180 + lastPosition.x;
  let y = cy - 100 + lastPosition.y;
  lastPosition.x += 36; lastPosition.y += 36;

  // Rebote en bordes
  if (x > maxW) { x = margin; lastPosition.x = 0; }
  if (y > maxH) { y = 80; lastPosition.y = 0; }
  if (x < margin) x = margin;
  if (y < 70) y = 70;

  return { left: x, top: y };
}

// --- Create window base ---
function createWindow(type, title, width, height, contentHTML, opts = {}) {
  const id = ++artifactIdCounter;
  const el = document.createElement('div');
  el.className = 'aw entering';
  el.dataset.id = id;
  el.dataset.type = type;
  el.style.width = width + 'px';
  if (height) el.style.height = height + 'px';

  const pos = getNextPosition(width, height || 300);
  el.style.left = pos.left + 'px';
  el.style.top = pos.top + 'px';

  const resizable = opts.resizable !== false;
  const minW = opts.minW || 260;
  const minH = opts.minH || 180;

  el.innerHTML = `
    <div class="aw-header flex items-center justify-between px-3.5 py-2.5 bg-white/[0.03] border-b border-white/8 shrink-0">
      <div class="flex items-center gap-2 min-w-0">
        ${opts.icon ? `<span class="text-sm shrink-0">${opts.icon}</span>` : ''}
        <span class="badge text-muted truncate">${title}</span>
      </div>
      <div class="flex items-center gap-1 shrink-0">
        ${opts.headerActions || ''}
        <button class="aw-close w-6 h-6 rounded hover:bg-red-500/20 text-muted hover:text-red-300 transition flex items-center justify-center">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="aw-body flex-1 overflow-hidden flex flex-col min-h-0">${contentHTML}</div>
    ${resizable ? '<div class="aw-resize"></div>' : ''}
  `;

  layer.appendChild(el);
  el.querySelector('.aw-close').onclick = (e) => { e.stopPropagation(); closeArtifact(id); };
  el.addEventListener('pointerdown', () => focusWindow(el));

  // Drag
  const header = el.querySelector('.aw-header');
  header.addEventListener('pointerdown', (e) => {
    if (e.target.closest('button')) return;
    if (gridMode) return;
    focusWindow(el);
    const startX = e.clientX, startY = e.clientY;
    const origLeft = parseInt(el.style.left), origTop = parseInt(el.style.top);
    const onMove = (ev) => {
      let nx = origLeft + (ev.clientX - startX);
      let ny = origTop + (ev.clientY - startY);
      nx = Math.max(0, Math.min(window.innerWidth - 80, nx));
      ny = Math.max(50, Math.min(window.innerHeight - 60, ny));
      el.style.left = nx + 'px'; el.style.top = ny + 'px';
    };
    const onUp = () => { document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });

  // Resize
  if (resizable) {
    const handle = el.querySelector('.aw-resize');
    handle.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      focusWindow(el);
      const startX = e.clientX, startY = e.clientY;
      const origW = el.offsetWidth, origH = el.offsetHeight;
      const onMove = (ev) => {
        let nw = Math.max(minW, origW + (ev.clientX - startX));
        let nh = Math.max(minH, origH + (ev.clientY - startY));
        el.style.width = nw + 'px'; el.style.height = nh + 'px';
      };
      const onUp = () => { document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
    });
  }

  // Register
  const entry = { id, type, title, el, closed: false, timestamp: new Date() };
  artifacts.push(entry);
  zIndexCounter++; el.style.zIndex = zIndexCounter;
  focusWindow(el);
  setTimeout(() => el.classList.remove('entering'), 500);
  updateCount(); renderDrawer();
  return { el, id, entry };
}

// --- Copy helper ---
function copyBtnHTML(onclick = 'copyToClipboard(this)') {
  return `<button class="tooltip w-6 h-6 rounded hover:bg-white/10 text-muted hover:text-accent transition flex items-center justify-center" data-tip="Copiar" onclick="${onclick}">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
  </button>`;
}
function copyToClipboard(btn) {
  const original = btn.innerHTML;
  btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
  btn.classList.add('text-ok');
  setTimeout(() => { btn.innerHTML = original; btn.classList.remove('text-ok'); }, 1500);
}

markdown: () => ({
  width: 400, height: 480, icon:'📝', title:'guia_implementacion.md', resizable:true, minW:300, minH:250,
  headerActions: copyBtnHTML() + `<button class="tooltip w-6 h-6 rounded hover:bg-white/10 text-muted hover:text-accent transition flex items-center justify-center" data-tip="Descargar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></button>`,
  body: `
    <div class="flex flex-1 overflow-hidden">
      <div class="w-32 shrink-0 border-r border-white/5 p-3 overflow-y-auto scrollbar-thin">
        <div class="badge text-muted mb-2">contenidos</div>
        <div class="space-y-1 text-[10px]">
          <a class="block text-fg/60 hover:text-accent transition truncate">Introducción</a>
          <a class="block text-fg/60 hover:text-accent transition truncate">Arquitectura</a>
          <a class="block text-fg/60 hover:text-accent transition pl-2 truncate">Event Store</a>
          <a class="block text-fg/60 hover:text-accent transition pl-2 truncate">Proyecciones</a>
          <a class="block text-fg/60 hover:text-accent transition truncate">Implementación</a>
          <a class="block text-fg/60 hover:text-accent transition pl-2 truncate">Paso 1: Eventos</a>
          <a class="block text-fg/60 hover:text-accent transition pl-2 truncate">Paso 2: Store</a>
          <a class="block text-fg/60 hover:text-accent transition pl-2 truncate">Paso 3: Replay</a>
          <a class="block text-fg/60 hover:text-accent transition truncate">Testing</a>
          <a class="block text-fg/60 hover:text-accent transition truncate">Conclusión</a>
        </div>
      </div>
      <div class="prose-md flex-1 overflow-y-auto scrollbar-thin p-5">
        <h1>Guía de Implementación Event-Sourced</h1>
        <p>Esta guía describe cómo implementar un sistema <strong>event-sourced</strong> con proyecciones <strong>CQRS</strong> para desacoplar la capa de escritura de la lectura. Es la arquitectura recomendada para sistemas con alta concurrencia y necesidad de auditoría completa.</p>
        <h2>Arquitectura</h2>
        <p>El sistema se divide en tres componentes principales:</p>
        <ul>
          <li><strong>Event Store</strong>: append-only, inmutable. Guarda todos los eventos de dominio.</li>
          <li><strong>Proyecciones</strong>: vistas materializadas optimizadas para lectura.</li>
          <li><strong>Command Handlers</strong>: validan y procesan comandos, producen eventos.</li>
        </ul>
        <h3>Event Store</h3>
        <p>El event store es la fuente de verdad. Cada evento se persiste de forma <strong>inmutable</strong>. Nunca se modifica ni se elimina un evento ya persistido.</p>
        <pre><code>// Definición de un evento
record UserRegistered(
    string UserId,
    string Email,
    DateTime Timestamp
);</code></pre>
        <h3>Proyecciones</h3>
        <p>Las proyecciones se reconstruyen aplicando eventos en orden. Si una proyección se corrompe, se puede <strong>replay</strong> desde el event store.</p>
        <div class="callout callout-warn">⚠ Los eventos deben ser inmutables. Nunca modifiques un evento ya persistido. Si necesitas corregir, emite un evento compensatorio.</div>
        <h2>Implementación</h2>
        <h3>Paso 1: Definir Eventos</h3>
        <p>Identifica todos los eventos de dominio. Cada evento debe ser <code>serializable</code> y contener toda la información necesaria para aplicar el cambio.</p>
        <ol>
          <li>Identificar agregados raíz</li>
          <li>Definir eventos por agregado</li>
          <li>Versionar eventos (schema versioning)</li>
          <li>Implementar upcasters para migraciones</li>
        </ol>
        <h3>Paso 2: Crear Event Store</h3>
        <p>Usa un store con soporte para <code>optimistic concurrency</code>. Cada stream tiene un número de versión esperado.</p>
        <div class="callout callout-info">ℹ Recomendado: usar EventStoreDB o Postgres con tablas append-only para empezar.</div>
        <h3>Paso 3: Configurar Replay</h3>
        <p>El replay es la capacidad de reconstruir el estado desde cero aplicando todos los eventos en orden. Para sistemas grandes, usa <strong>snapshots</strong> periódicos.</p>
        <blockquote>El event sourcing no es sobre guardar el estado actual, sino sobre guardar cómo llegamos a él. Cada evento es un hecho histórico inmutable.</blockquote>
        <h2>Testing</h2>
        <p>Para testing, usa <code>event-store-testkit</code>. Permite crear escenarios reproducibles con eventos pre-cargados.</p>
        <div class="callout callout-tip">✓ Los tests basados en eventos son determinísticos por naturaleza. Si fallan, siempre reproducen el mismo error.</div>
        <h2>Conclusión</h2>
        <p>El event sourcing con CQRS es una arquitectura poderosa para sistemas que requieren auditoría completa, replay de estado y desacoplamiento entre escritura y lectura. La complejidad inicial se compensa con flexibilidad a largo plazo.</p>
        <p>Para más información consulta la <a href="#">documentación oficial</a> y el <a href="#">repositorio de ejemplos</a>.</p>
      </div>
    </div>`
}),

  voice: "Sincronizando salida de audio. ¿Me escuchas con claridad?",
};

W.trigger = function(type, customText = "") {
  orb.style.filter = 'drop-shadow(0 0 60px #22d3ee)';
  setTimeout(() => {
    const text = customText || TRIGGER_TEXTS[type] || "";
    if (text) { streamText(text); logConversation('kali', text, [type]); }
    if (type === 'voice') { orb.style.background = 'radial-gradient(circle at 35% 30%, #34d399, #22d3ee 45%, #0891b2 90%)'; showVoiceBar(); }
    if (type === 'text' && customText) { logConversation('user', customText); return; }
    const tpl = TEMPLATES[type];
    if (tpl) {
      const cfg = tpl();
      createWindow(type, cfg.title, cfg.width, cfg.height, cfg.body, {
        icon: cfg.icon, resizable: cfg.resizable, minW: cfg.minW, minH: cfg.minH, headerActions: cfg.headerActions
      });
    }
    orb.style.filter = 'drop-shadow(0 0 40px rgba(34,211,238,0.4))';
  }, 400);
};

// Orb click demo
orb.addEventListener('click', () => {
  const states = [
    { bg:'radial-gradient(circle at 30% 30%, #67e8f9, #22d3ee 40%, #0891b2 100%)', txt:'idle · esperando' },
    { bg:'radial-gradient(circle at 35% 30%, #fde68a, #fbbf24 45%, #b45309 90%)', txt:'escuchando · 0:03' },
    { bg:'radial-gradient(circle at 35% 30%, #f9a8d4, #f472b6 45%, #a855f7 90%)', txt:'pensando · 0.8s' },
    { bg:'radial-gradient(circle at 35% 30%, #6ee7b7, #34d399 45%, #059669 90%)', txt:'hablando · 0:12' },
  ];
  if (!orb._stateIdx) orb._stateIdx = 0;
  const s = states[orb._stateIdx % states.length]; orb._stateIdx++;
  orb.style.background = s.bg;
});

// Drag debug panel
const panel = document.getElementById('debug-panel');
let dbgDrag = false, dbgOff = {x:0,y:0};
panel.addEventListener('pointerdown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  dbgDrag = true; dbgOff.x = e.clientX - panel.offsetLeft; dbgOff.y = e.clientY - panel.offsetTop;
});
document.addEventListener('pointermove', (e) => { if (!dbgDrag) return; panel.style.left = (e.clientX - dbgOff.x)+'px'; panel.style.top = (e.clientY - dbgOff.y)+'px'; panel.style.right = 'auto'; });
document.addEventListener('pointerup', () => dbgDrag = false);

</script>
