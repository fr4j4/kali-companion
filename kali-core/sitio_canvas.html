<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 Canvas Mágico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(100, 100, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            color: #e0e0ff;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 1.6rem;
        }

        h1 span {
            color: #7c7cff;
            font-weight: 600;
        }

        canvas {
            display: block;
            border-radius: 16px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
            cursor: crosshair;
            background: #12121f;
            width: 700px;
            height: 500px;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .controls button {
            background: #2a2a4a;
            border: none;
            color: #c0c0e0;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-family: inherit;
        }

        .controls button:hover {
            background: #3a3a6a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 100, 255, 0.2);
        }

        .controls button:active {
            transform: translateY(0);
        }

        .controls button.active {
            background: #5a5aff;
            color: white;
            box-shadow: 0 0 20px rgba(90, 90, 255, 0.3);
        }

        .color-picker {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker input {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-picker input::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .color-picker input::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .size-control {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0a0c0;
        }

        .size-control input[type="range"] {
            width: 100px;
            accent-color: #7c7cff;
        }

        .info {
            color: #6a6a8a;
            text-align: center;
            margin-top: 12px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 <span>Canvas</span> Mágico</h1>
        <canvas id="miCanvas" width="700" height="500"></canvas>
        <div class="controls">
            <button id="btnDibujar" class="active">✏️ Dibujar</button>
            <button id="btnBorrar">🧹 Borrar</button>
            <button id="btnFiguras">🔷 Figuras</button>
            <button id="btnLimpiar">🗑️ Limpiar</button>
            <div class="color-picker">
                <input type="color" id="colorPicker" value="#7c7cff">
            </div>
            <div class="size-control">
                <span>●</span>
                <input type="range" id="sizeRange" min="2" max="30" value="6">
                <span style="font-size:0.7rem;">30</span>
            </div>
        </div>
        <div class="info">💡 Dibuja libremente, borra, o genera figuras aleatorias</div>
    </div>

    <script>
        const canvas = document.getElementById('miCanvas');
        const ctx = canvas.getContext('2d');

        // Estado
        let modo = 'dibujar'; // 'dibujar' | 'borrar' | 'figuras'
        let dibujando = false;
        let color = '#7c7cff';
        let tamanio = 6;

        // --- Inicializar canvas con fondo oscuro ---
        function initCanvas() {
            ctx.fillStyle = '#12121f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Dibujar una cuadrícula sutil
            dibujarCuadricula();
        }

        function dibujarCuadricula() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += 40) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += 40) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        initCanvas();

        // --- Eventos del mouse ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;
            return { x: Math.min(Math.max(x, 0), canvas.width), y: Math.min(Math.max(y, 0), canvas.height) };
        }

        function empezarDibujo(e) {
            dibujando = true;
            const pos = getPos(e);
            if (modo === 'figuras') {
                generarFigura(pos.x, pos.y);
                dibujando = false;
                return;
            }
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function dibujar(e) {
            if (!dibujando) return;
            if (modo === 'figuras') return;
            const pos = getPos(e);
            const esBorrador = modo === 'borrar';

            ctx.lineWidth = esBorrador ? tamanio * 3 : tamanio;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = esBorrador ? '#12121f' : color;

            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function pararDibujo() {
            dibujando = false;
            ctx.beginPath();
        }

        canvas.addEventListener('mousedown', empezarDibujo);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('mouseup', pararDibujo);
        canvas.addEventListener('mouseleave', pararDibujo);

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX,
                clientY: touch.clientY
            });
            canvas.dispatchEvent(mouseEvent);
        });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            canvas.dispatchEvent(new MouseEvent('mouseup'));
        });

        // --- Figuras aleatorias ---
        function generarFigura(cx, cy) {
            const tipos = ['circulo', 'rectangulo', 'triangulo', 'estrella', 'linea'];
            const tipo = tipos[Math.floor(Math.random() * tipos.length)];
            const size = 20 + Math.random() * 60;
            const hue = Math.floor(Math.random() * 360);
            const sat = 60 + Math.random() * 40;
            const lig = 50 + Math.random() * 30;
            const colorFig = `hsl(${hue}, ${sat}%, ${lig}%)`;
            const alpha = 0.6 + Math.random() * 0.4;

            ctx.save();
            ctx.globalAlpha = alpha;

            switch (tipo) {
                case 'circulo':
                    ctx.beginPath();
                    ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
                    ctx.fillStyle = colorFig;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    break;

                case 'rectangulo':
                    ctx.fillStyle = colorFig;
                    ctx.fillRect(cx - size / 2, cy - size / 2, size, size);
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(cx - size / 2, cy - size / 2, size, size);
                    break;

                case 'triangulo':
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - size / 2);
                    ctx.lineTo(cx - size / 2, cy + size / 2);
                    ctx.lineTo(cx + size / 2, cy + size / 2);
                    ctx.closePath();
                    ctx.fillStyle = colorFig;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    break;

                case 'estrella':
                    const spikes = 5;
                    const outerR = size / 2;
                    const innerR = outerR * 0.4;
                    ctx.beginPath();
                    for (let i = 0; i < spikes * 2; i++) {
                        const r = i % 2 === 0 ? outerR : innerR;
                        const angle = (i * Math.PI) / spikes - Math.PI / 2;
                        const x = cx + r * Math.cos(angle);
                        const y = cy + r * Math.sin(angle);
                        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fillStyle = colorFig;
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    break;

                case 'linea':
                    const angle2 = Math.random() * Math.PI * 2;
                    const len = size * 1.5;
                    const x2 = cx + len * Math.cos(angle2);
                    const y2 = cy + len * Math.sin(angle2);
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = colorFig;
                    ctx.lineWidth = 3 + Math.random() * 6;
                    ctx.stroke();
                    break;
            }

            ctx.restore();
        }

        // --- Botones ---
        document.getElementById('btnDibujar').addEventListener('click', () => {
            modo = 'dibujar';
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btnDibujar').classList.add('active');
            canvas.style.cursor = 'crosshair';
        });

        document.getElementById('btnBorrar').addEventListener('click', () => {
            modo = 'borrar';
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btnBorrar').classList.add('active');
            canvas.style.cursor = 'cell';
        });

        document.getElementById('btnFiguras').addEventListener('click', () => {
            modo = 'figuras';
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btnFiguras').classList.add('active');
            canvas.style.cursor = 'pointer';
        });

        document.getElementById('btnLimpiar').addEventListener('click', () => {
            initCanvas();
        });

        document.getElementById('colorPicker').addEventListener('input', (e) => {
            color = e.target.value;
        });

        document.getElementById('sizeRange').addEventListener('input', (e) => {
            tamanio = parseInt(e.target.value);
        });

        // --- Atajos de teclado ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'd') document.getElementById('btnDibujar').click();
            if (e.key === 'b') document.getElementById('btnBorrar').click();
            if (e.key === 'f') document.getElementById('btnFiguras').click();
            if (e.key === 'l') document.getElementById('btnLimpiar').click();
        });

        console.log('🎨 Canvas Mágico listo! Atajos: [D]ibujar, [B]orrar, [F]iguras, [L]impiar');
    </script>
</body>
</html>
